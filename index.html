<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>任务管理面板</title>
    <link rel="stylesheet" href="styles/main.css" />
</head>
<body>
    <!-- 1. 顶部区域 -->
    <header class="header">
        <div class="logo">TaskFlow</div>
        <form class="search-form">
            <input type="text" class="search-input" placeholder="搜索任务..." />
        </form>
        <button class="add-btn">新建任务</button>
    </header>

    <!-- 2. 导航区域 -->
    <nav class="nav">
        <a href="#" class="nav-item active">Dashboard</a>
        <a href="#" class="nav-item">My Tasks</a>
        <a href="#" class="nav-item">Settings</a>
    </nav>

    <!-- 3. 主内容区 -->
    <main class="main">
        <!-- A. 数据卡片区 -->
        <section class="card-section">
            <h2>数据概览</h2>
            <div class="card-grid">
                <article class="card">
                    <h3>今日待办</h3>
                    <p class="card-number">5 项</p>
                </article>
                <article class="card">
                    <h3>已完成</h3>
                    <p class="card-number">12 项</p>
                </article>
            </div>
        </section>

        <!-- B. 任务列表区 -->
        <section class="task-section">
            <h2>我的任务</h2>
            <ul class="task-list">
                <li class="task-item">
                    <div class="task-content">
                        <h4>完成项目文档编写</h4>
                        <p>截止日期: 2023-10-27</p>
                    </div>
                    <span class="status status-ongoing">进行中</span>
                </li>
                <li class="task-item">
                    <div class="task-content">
                        <h4>团队周会汇报</h4>
                        <p>截止日期: 2023-10-28</p>
                    </div>
                    <span class="status status-done">已完成</span>
                </li>
                <li class="task-item">
                    <div class="task-content">
                        <h4>前端页面开发</h4>
                        <p>截止日期: 2023-10-29</p>
                    </div>
                    <span class="status status-ongoing">进行中</span>
                </li>
                <li class="task-item">
                    <div class="task-content">
                        <h4>提交作业并截图</h4>
                        <p>截止日期: 2023-10-30</p>
                    </div>
                    <span class="status status-done">已完成</span>
                </li>
            </ul>
        </section>

        <!-- C. 附加信息模块 -->
        <section class="extra-section">
            <h2>今日日程</h2>
            <ul class="schedule-list">
                <li>10:00 - 11:00 项目启动会</li>
                <li>14:00 - 15:00 代码评审</li>
            </ul>
        </section>
    </main>
</body>
</html>
